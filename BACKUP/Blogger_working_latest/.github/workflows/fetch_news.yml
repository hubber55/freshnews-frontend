name: FreshNews - Malayalam Auto Publisher

on:
  schedule:
    # Runs every 30 minutes, 24/7
    - cron: '*/30 * * * *'
  
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'Manual trigger'

jobs:
  publish-news:
    name: Fetch & Publish Malayalam News
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Checkout code ────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Setup Python ─────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── Step 3: Install dependencies ─────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Step 4: Run the news pipeline ────────────────────────
      - name: Run FreshNews pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          BLOGGER_CLIENT_ID: ${{ secrets.BLOGGER_CLIENT_ID }}
          BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
        run: python main.py

      # ── Step 5: Upload log as artifact ───────────────────────
      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: freshnews-log-${{ github.run_number }}
          path: freshnews.log
          retention-days: 7
